name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/api

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pml_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-jwt-secret-with-at-least-32-characters
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Check API lint
        run: npm run lint:check

      - name: Run API unit tests
        run: npm test -- --runInBand

      - name: Generate API coverage
        run: npm run test:cov -- --runInBand

      - name: Build API
        run: npm run build

      - name: Audit API production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: ignore
          retention-days: 14

  web:
    name: Web Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Check web lint
        run: npm run lint

      - name: Build web application
        run: npm run build

      - name: Audit web production dependencies
        run: npm audit --omit=dev --audit-level=high
